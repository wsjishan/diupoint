name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install All Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: Materialize Standalone Deployment
        run: |
          mkdir -p deploy_ready
          test -f apps/api/dist/main.js
          mkdir -p deploy_ready/dist
          cp -r apps/api/dist/. deploy_ready/dist/
          cp apps/api/package.json deploy_ready/
          cp -RL apps/api/node_modules deploy_ready/node_modules

          # Copy generated Prisma runtime client metadata from pnpm store into final artifact
          PRISMA_DEFAULT_JS=$(find node_modules -type f -path "*/.prisma/client/default.js" | head -n 1 || true)
          if [ -z "$PRISMA_DEFAULT_JS" ]; then
            echo "ERROR: Could not locate generated .prisma/client/default.js in workspace node_modules"
            exit 1
          fi
          PRISMA_DIR=$(dirname "$(dirname "$PRISMA_DEFAULT_JS")")
          cp -r "$PRISMA_DIR" deploy_ready/node_modules/

      - name: Smoke Test Standalone Bundle
        run: |
          echo "Inspecting deploy_ready layout..."
          ls -la deploy_ready
          ls -la deploy_ready/dist || true
          test -f deploy_ready/dist/main.js
          test -f deploy_ready/node_modules/@nestjs/common/package.json
          test -f deploy_ready/node_modules/.prisma/client/default.js
          DATABASE_URL='postgresql://dummy:dummy@localhost/mydb' JWT_SECRET='ci-smoke-secret' PORT=8080 node deploy_ready/dist/main.js &
          APP_PID=$!
          sleep 8
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
