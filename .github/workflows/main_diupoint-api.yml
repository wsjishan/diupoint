name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install All Dependencies
        run: pnpm install

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: The Flawless Monorepo Bundle
        run: |
          mkdir -p deploy_ready
          cp -r apps/api/dist deploy_ready/dist
          cp package.json deploy_ready/
          

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
