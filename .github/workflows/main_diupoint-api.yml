name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install All Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: Materialize Standalone Deployment
        run: |
          STAGE_DIR="$PWD/.stage_api_deploy"
          pnpm --filter ./apps/api deploy --legacy "$STAGE_DIR"

          mkdir -p "$STAGE_DIR/prisma"
          cp packages/db/prisma/schema.prisma "$STAGE_DIR/prisma/schema.prisma"

          DATABASE_URL='postgresql://dummy:dummy@localhost/mydb' \
            "$STAGE_DIR/node_modules/.bin/prisma" generate --schema "$STAGE_DIR/prisma/schema.prisma"

          mkdir -p deploy_ready
          cp -a "$STAGE_DIR"/. deploy_ready/

      - name: Smoke Test Standalone Bundle
        run: |
          echo "Inspecting deploy_ready layout..."
          ls -la deploy_ready
          ls -la deploy_ready/dist || true
          test -f deploy_ready/dist/main.js
          test -f deploy_ready/node_modules/@nestjs/common/package.json
          test -f deploy_ready/prisma/schema.prisma
          test -f deploy_ready/node_modules/.bin/prisma

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          startup-command: 'if [ -x ./node_modules/.bin/prisma ]; then ./node_modules/.bin/prisma generate --schema ./prisma/schema.prisma; else node ./node_modules/prisma/build/index.js generate --schema ./prisma/schema.prisma; fi && node dist/main.js'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
