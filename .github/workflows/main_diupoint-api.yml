name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install All Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: Materialize Standalone Deployment
        run: |
          STAGE_DIR="$PWD/.stage_api_deploy"
          DEPLOY_DIR="$PWD/deploy_ready"
          
          pnpm --filter ./apps/api deploy --legacy --prod "$STAGE_DIR"
          
          mkdir -p "$DEPLOY_DIR"
          cp -aL "$STAGE_DIR"/. "$DEPLOY_DIR"/
          
          PRISMA_DIR=$(find "$DEPLOY_DIR/node_modules/.pnpm" -type d -path "*/node_modules/.prisma" | head -n 1)
          cp -a "$PRISMA_DIR" "$DEPLOY_DIR/node_modules/"
          
          echo "Running hard validation checks..."
          test -f "$DEPLOY_DIR/dist/main.js" || { echo "Validation Failed: Missing main.js"; exit 1; }
          test -f "$DEPLOY_DIR/node_modules/@nestjs/common/package.json" || { echo "Validation Failed: Missing @nestjs/common"; exit 1; }
          test -d "$DEPLOY_DIR/node_modules/.prisma/client" || { echo "Validation Failed: Missing Prisma Client"; exit 1; }
          echo "Validation Passed. Artifact is ready."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
