name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install All Dependencies
        run: pnpm install

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: The Flawless Monorepo Bundle
        run: |
          mkdir -p deploy_ready
          cp -r apps/api/dist deploy_ready/dist
          cp apps/api/package.json deploy_ready/
          cp -RL apps/api/node_modules deploy_ready/node_modules
          echo "Hunting down the hidden .prisma folder..."
          PRISMA_DIR=$(find node_modules/.pnpm -type d -path "*/node_modules/.prisma" | head -n 1 || true)
          if [ -z "$PRISMA_DIR" ]; then
            echo "ERROR: .prisma folder not found under node_modules/.pnpm after prisma generate"
            exit 1
          fi
          echo "Found it exactly at: $PRISMA_DIR"
          cp -r "$PRISMA_DIR" deploy_ready/node_modules/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
