name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install All Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: Materialize Standalone Deployment
        run: |
          STAGE_DIR="$PWD/.stage_api_deploy"
          pnpm --filter ./apps/api deploy --legacy "$STAGE_DIR"

          # Never ship local env files to Azure; rely on App Service settings.
          find "$STAGE_DIR" -maxdepth 1 -type f -name '.env*' -delete

          mkdir -p "$STAGE_DIR/prisma"
          cp packages/db/prisma/schema.prisma "$STAGE_DIR/prisma/schema.prisma"

          DATABASE_URL='postgresql://dummy:dummy@localhost/mydb' \
            "$STAGE_DIR/node_modules/.bin/prisma" generate --schema "$STAGE_DIR/prisma/schema.prisma"

          mkdir -p deploy_ready
          cp -a "$STAGE_DIR"/. deploy_ready/

      - name: Smoke Test Standalone Bundle
        run: |
          echo "Inspecting deploy_ready layout..."
          ls -la deploy_ready
          ls -la deploy_ready/dist || true
          test -f deploy_ready/dist/main.js
          test -f deploy_ready/package.json
          node -e "const p=require('./deploy_ready/package.json'); if(!p.scripts||!p.scripts.start){ throw new Error('Missing scripts.start in deploy_ready/package.json'); } console.log('start script:', p.scripts.start)"
          test -f deploy_ready/node_modules/@nestjs/common/package.json
          test -f deploy_ready/node_modules/tslib/tslib.js
          test -f deploy_ready/prisma/schema.prisma
          test -f deploy_ready/node_modules/.bin/prisma
          test ! -f deploy_ready/.env
          node -e "require('./deploy_ready/node_modules/tslib/tslib.js'); console.log('tslib ok')"

      - name: Boot Smoke Test Standalone App
        run: |
          set -euo pipefail

          pushd deploy_ready >/dev/null

          export NODE_ENV='production'
          export JWT_SECRET='ci-smoke-jwt-secret'
          export DATABASE_URL='postgresql://dummy:dummy@127.0.0.1:5432/dummy'
          export PORT='4100'

          node dist/main.js >/tmp/api-smoke.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" 2>/dev/null || true
            wait "$APP_PID" 2>/dev/null || true
          }

          trap cleanup EXIT

          for i in $(seq 1 20); do
            status_code=$(curl -sS -o /tmp/local-health.json -w '%{http_code}' "http://127.0.0.1:${PORT}/api/health" || true)

            if [ "$status_code" = '200' ]; then
              echo "Standalone boot smoke test passed on attempt $i/20"
              [ -f /tmp/local-health.json ] && cat /tmp/local-health.json || true
              trap - EXIT
              cleanup
              popd >/dev/null
              exit 0
            fi

            sleep 1
          done

          echo 'Standalone boot smoke test failed: /api/health did not return 200 in time.'
          [ -f /tmp/api-smoke.log ] && cat /tmp/api-smoke.log || true
          popd >/dev/null
          exit 1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy_to_azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}

      - name: Verify Live API Health
        env:
          DEPLOYED_APP_URL: ${{ steps.deploy_to_azure.outputs.webapp-url }}
        run: |
          echo "Deployment output URL: ${DEPLOYED_APP_URL:-<empty>}"

          if [ -n "$DEPLOYED_APP_URL" ]; then
            HEALTH_URL="${DEPLOYED_APP_URL%/}/api/health"
          else
            echo 'Unable to determine health URL from deployment output (webapp-url).'
            exit 1
          fi

          ATTEMPTS=18
          SLEEP_SECONDS=10

          echo "Waiting for healthy response from: $HEALTH_URL"

          HEALTH_HOST=$(printf '%s' "$HEALTH_URL" | sed -E 's#^https?://([^/]+).*$#\1#')
          getent hosts "$HEALTH_HOST" >/dev/null || {
            echo "DNS lookup failed for $HEALTH_HOST"
            exit 1
          }

          for i in $(seq 1 "$ATTEMPTS"); do
            status_code=$(curl -sS -L -D /tmp/health.headers -o /tmp/health.body -w '%{http_code}' "$HEALTH_URL" || true)

            if [ "$status_code" = '200' ]; then
              echo "Health check passed on attempt $i/$ATTEMPTS"
              [ -f /tmp/health.headers ] && sed -n '1,20p' /tmp/health.headers || true
              [ -f /tmp/health.body ] && sed -n '1,60p' /tmp/health.body || true
              exit 0
            fi

            echo "Attempt $i/$ATTEMPTS returned HTTP $status_code. Retrying in ${SLEEP_SECONDS}s..."
            [ -f /tmp/health.headers ] && sed -n '1,20p' /tmp/health.headers || true
            [ -f /tmp/health.body ] && sed -n '1,40p' /tmp/health.body || true
            sleep "$SLEEP_SECONDS"
          done

          echo 'Health check failed: API did not return HTTP 200 in time.'
          echo 'Last health response headers:'
          [ -f /tmp/health.headers ] && sed -n '1,40p' /tmp/health.headers || true
          echo 'Last health response body:'
          [ -f /tmp/health.body ] && sed -n '1,120p' /tmp/health.body || true
          exit 1
