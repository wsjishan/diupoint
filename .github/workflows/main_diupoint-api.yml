name: Build and deploy NestJS API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install All Dependencies
        run: pnpm install

      - name: Generate Prisma Client and Build API
        run: |
          pnpm --filter @diupoint/db exec prisma generate --schema ./prisma/schema.prisma
          pnpm --filter @diupoint/db run build
          pnpm --filter ./apps/api run build
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost/mydb'

      - name: Prepare Flat Azure Bundle
        run: |
          mkdir -p deploy_ready

          # API runtime entrypoint
          cp -r apps/api/dist deploy_ready/dist

          # Use API package.json so Azure can run `npm start` -> node dist/main.js
          cp apps/api/package.json deploy_ready/package.json

          # Copy and dereference workspace symlinks so local packages are fully present
          cp -RL node_modules deploy_ready/node_modules

          # Stage Prisma schema for native server-side client generation on Azure
          mkdir -p deploy_ready/prisma
          cp packages/db/prisma/schema.prisma deploy_ready/prisma/schema.prisma

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy_ready

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_06CA381582F54E3B97474EB74EC44CF5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E04241B78AC2477AA922A7C0A8662A10 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1A24211C19B4606B9EC4847A9D9C782 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'diupoint-api'
          package: .
          startup-command: 'npm install prisma@6 && npx prisma generate && node dist/main.js'
